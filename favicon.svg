<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Magnifying glass icon (search/review symbol) -->
  <circle cx="220" cy="220" r="100" fill="none" stroke="#fff" stroke-width="40" opacity="0.95"/>
  <line x1="290" y1="290" x2="400" y2="400" stroke="#fff" stroke-width="45" stroke-linecap="round" opacity="0.95"/>
  <!-- Checkmark inside the glass (verified/approved) -->
  <polyline points="175,220 210,258 272,185" fill="none" stroke="#fff" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
</svg>